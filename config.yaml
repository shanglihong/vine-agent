# Vine-Agent 全局配置文件

# 服务端与前端端口配置
server:
  # 后端接口服务监听端口
  port: ":8080"
  # 前端开发服务运行端口
  frontend_port: 5173

# 长期记忆与数据库存储配置
storage:
  # 长期记忆画像（偏好与事实）存放的物理文件路径
  profile_dir: "~/.vine-agent/data/profile"
  # SQLite 数据库物理文件路径
  sqlite_db_path: "~/.vine-agent/data/db/memory.db"
  # 项目（Project）物理工作空间的根目录
  project_root_dir: "~/.vine-agent/project/"
